<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScreenShip Editor</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body>
    <div class="editor-shell">
      <header class="topbar">
        <div class="brand">⛵ ScreenShip</div>
        <div class="topbar-actions">
          <button id="undo-button" class="topbar-button">↶ Undo</button>
          <button id="redo-button" class="topbar-button">↷ Redo</button>
          <button id="export-button" class="topbar-button topbar-button--primary">💾 Save</button>
        </div>
        <div class="topbar-export">
          <label for="export-format">Export</label>
          <select id="export-format">
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="webp">WebP</option>
          </select>
          <label for="export-quality">Quality</label>
          <input id="export-quality" type="range" min="0.1" max="1" step="0.05" value="0.9" />
          <button id="copy-button" class="topbar-button">📋 Copy</button>
          <button id="theme-toggle" class="topbar-button" aria-label="Toggle theme">☀️ Day</button>
        </div>
      </header>

      <div class="workspace">
        <aside class="tools-panel">
          <button class="tool-button is-active" data-tool="move">🖐️ Move (V)</button>
          <button class="tool-button" data-tool="crop">✂️ Crop (C)</button>
          <button class="tool-button" data-tool="pen">✏️ Pen (P)</button>
          <button class="tool-button" data-tool="highlight">🖍️ Highlight (H)</button>
          <button class="tool-button" data-tool="blur">🫧 Blur (B)</button>
          <button class="tool-button" data-tool="text">📝 Text (T)</button>
          <button class="tool-button" data-tool="sticky">🗒️ Sticky Note</button>
          <button class="tool-button" data-tool="rect">⬛ Rectangle</button>
          <button class="tool-button" data-tool="ellipse">⚪ Ellipse</button>
          <button class="tool-button" data-tool="line">➖ Line</button>
          <button class="tool-button" data-tool="arrow">➡️ Arrow</button>
        </aside>

        <main class="canvas-stage">
          <div id="empty-state" class="empty-state">Capture a screenshot to begin editing.</div>
          <div id="canvas-wrapper" class="canvas-wrapper is-hidden">
            <canvas id="editor-canvas"></canvas>
            <textarea id="inline-text-editor" class="inline-text-editor is-hidden" spellcheck="true" wrap="off"></textarea>
          </div>
          <div class="canvas-footer">
            <p id="editor-status" class="editor-status" aria-live="polite"></p>
            <p class="editor-attribution">
              Screenship by Lynn Cole, available at
              <a
                href="https://github.com/LynnColeArt/Screenship"
                target="_blank"
                rel="noopener noreferrer"
              >https://github.com/LynnColeArt/Screenship</a>
              and licensed under AGPL
            </p>
          </div>
        </main>

        <aside class="inspector-panel">
          <section id="properties-section" class="inspector-section">
            <h2>Layer Properties</h2>
            <p id="inspector-hint" class="inspector-hint">Select a layer to edit context-specific properties.</p>
            <label class="inspector-field" data-inspector="all">
              Blend Mode
              <select id="blend-mode">
                <option value="normal">Normal</option>
                <option value="multiply">Multiply</option>
                <option value="screen">Screen</option>
                <option value="overlay">Overlay</option>
                <option value="darken">Darken</option>
                <option value="lighten">Lighten</option>
                <option value="color-burn">Color Burn</option>
                <option value="color-dodge">Color Dodge</option>
                <option value="hard-light">Hard Light</option>
                <option value="soft-light">Soft Light</option>
                <option value="difference">Difference</option>
                <option value="exclusion">Exclusion</option>
              </select>
            </label>
            <label class="inspector-field" data-inspector="all">
              Opacity
              <input id="opacity" type="range" min="0.1" max="1" step="0.05" value="1" />
            </label>
            <label class="inspector-field" data-inspector="shape stroke highlight text">
              Foreground
              <input id="stroke-color" type="color" value="#ff0000" />
            </label>
            <label class="inspector-field" data-inspector="shape text">
              Background
              <input id="fill-color" type="color" value="#fff2a8" />
            </label>
            <label class="inspector-field" data-inspector="shape stroke highlight">
              Stroke Width
              <input id="stroke-width" type="range" min="1" max="24" value="4" />
            </label>
            <label class="inspector-field" data-inspector="text">
              Font Size
              <input id="font-size" type="range" min="10" max="64" value="18" />
            </label>
            <label class="inspector-field" data-inspector="blur">
              Blur Strength
              <input id="blur-strength" type="range" min="3" max="24" value="10" />
            </label>
            <label class="inspector-field" data-inspector="text">
              Font Family
              <select id="font-family">
                <option value="&quot;Avenir Next&quot;, sans-serif">Avenir Next</option>
                <option value="&quot;Trebuchet MS&quot;, sans-serif">Trebuchet</option>
                <option value="&quot;Courier New&quot;, monospace">Courier New</option>
                <option value="&quot;Georgia&quot;, serif">Georgia</option>
              </select>
            </label>
            <label class="inspector-field" data-inspector="text">
              Note Text
              <textarea
                id="text-content"
                rows="3"
                placeholder="Type note text. Click canvas with Text/Sticky tool to place."
              ></textarea>
            </label>
          </section>

          <section class="inspector-section">
            <div class="inspector-row">
              <h2>Layers</h2>
              <div class="inspector-inline-buttons">
                <button id="edit-text-button" class="small-button">Edit Text</button>
              </div>
            </div>
            <ul id="layers-list" class="layers-list"></ul>
          </section>

          <section class="inspector-section">
            <h2>Capture Metadata</h2>
            <dl id="metadata-list" class="metadata-list"></dl>
          </section>
        </aside>
      </div>
    </div>

    <script type="module" src="./editor.js"></script>
  </body>
</html>
